<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iris Memory</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h1>Iris Memory<span>三层记忆系统</span></h1>
    <nav>
      <div class="nav-item active" data-section="dashboard"><span class="icon">📊</span><span>仪表盘</span></div>
      <div class="nav-item" data-section="memories"><span class="icon">🧠</span><span>记忆管理</span></div>
      <div class="nav-item" data-section="kg"><span class="icon">🔗</span><span>知识图谱</span></div>
      <div class="nav-item" data-section="personas"><span class="icon">👤</span><span>用户画像</span></div>
      <div class="nav-item" data-section="proactive"><span class="icon">💬</span><span>主动回复</span></div>
      <div class="nav-item" data-section="io"><span class="icon">📦</span><span>导入导出</span></div>
      <div class="nav-item" data-section="cooldown"><span class="icon">❄️</span><span>冷却管理</span></div>
      <div class="nav-item" data-section="config"><span class="icon">⚙️</span><span>配置管理</span></div>
    </nav>
  </aside>
  <main class="main">
    <!-- Dashboard -->
    <section id="sec-dashboard" class="section active">
      <div class="section-header">
        <h2>仪表盘</h2>
        <div class="spacer"></div>
        <select id="trend-days" onchange="loadTrend()">
          <option value="7">近7天</option>
          <option value="14">近14天</option>
          <option value="30" selected>近30天</option>
          <option value="90">近90天</option>
        </select>
      </div>
      <div id="stats-grid" class="stats-grid"></div>
      <div id="type-distribution" class="stats-grid" style="margin-bottom:20px"></div>
      <div class="dashboard-row">
        <div class="dashboard-col">
          <div id="system-overview-container"></div>
        </div>
        <div class="dashboard-col">
          <div id="llm-overview-container"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📈 记忆增长趋势</div>
        <div class="chart-container">
          <div id="trend-bars" class="chart-bar-wrap"></div>
          <div id="trend-labels" class="chart-labels"></div>
        </div>
      </div>
      <div id="llm-recent-section" class="card" style="display:none">
        <div class="card-title">🤖 LLM 最近调用</div>
        <div id="llm-recent-container"></div>
      </div>
    </section>

    <!-- Memories -->
    <section id="sec-memories" class="section">
      <div class="section-header">
        <h2>记忆管理</h2>
        <div class="spacer"></div>
        <span id="mem-total-info" class="page-info"></span>
        <select id="mem-page-size" class="page-size-select">
          <option value="10">10条/页</option>
          <option value="20" selected>20条/页</option>
          <option value="50">50条/页</option>
          <option value="100">100条/页</option>
        </select>
      </div>
      <div class="filter-bar">
        <input type="text" id="mem-query" placeholder="搜索内容...">
        <input type="text" id="mem-user" placeholder="用户ID">
        <input type="text" id="mem-group" placeholder="群组ID">
        <select id="mem-layer">
          <option value="">全部层级</option>
          <option value="working">工作记忆</option>
          <option value="episodic">情景记忆</option>
          <option value="semantic">语义记忆</option>
        </select>
        <select id="mem-type">
          <option value="">全部类型</option>
          <option value="fact">事实</option>
          <option value="emotion">情感</option>
          <option value="relationship">关系</option>
          <option value="interaction">交互</option>
          <option value="inferred">推断</option>
        </select>
        <button class="btn btn-primary" onclick="searchMemories()">搜索</button>
        <button class="btn btn-outline" onclick="resetMemoryFilters()">重置</button>
      </div>
      <div class="filter-bar" style="margin-top:0">
        <label><input type="checkbox" id="select-all" onchange="toggleSelectAll()"> 全选</label>
        <span id="selected-count" style="font-size:13px;color:var(--text2)">0</span>
        <button id="batch-del-btn" class="btn btn-danger btn-sm" onclick="batchDeleteMemories()" disabled>批量删除</button>
      </div>
      <div id="mem-loading" class="loading" style="display:none"><div class="spinner"></div></div>
      <div class="card" style="padding:0">
        <div class="table-wrap">
          <table>
            <thead><tr><th class="checkbox-col"></th><th>内容</th><th>用户</th><th>类型</th><th>层级</th><th>置信度</th><th>时间</th><th>操作</th></tr></thead>
            <tbody id="mem-tbody"></tbody>
          </table>
        </div>
      </div>
      <div id="mem-pagination" class="pagination"></div>
    </section>

    <!-- Knowledge Graph -->
    <section id="sec-kg" class="section">
      <div class="section-header">
        <h2>知识图谱</h2>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchKgTab('graph')">图谱视图</div>
        <div class="tab" onclick="switchKgTab('nodes')">节点列表</div>
        <div class="tab" onclick="switchKgTab('edges')">边列表</div>
        <div class="spacer"></div>
        <button class="btn btn-outline btn-sm" onclick="refreshKgTab()">刷新</button>
      </div>
      <!-- Graph Tab -->
      <div id="kg-tab-graph">
        <div class="filter-bar">
          <input type="text" id="kg-user" placeholder="用户ID (可选)">
          <input type="text" id="kg-center" placeholder="中心节点ID (可选)">
          <select id="kg-depth">
            <option value="1">深度1</option>
            <option value="2" selected>深度2</option>
            <option value="3">深度3</option>
          </select>
          <button class="btn btn-primary" onclick="loadKgGraph()">加载图谱</button>
        </div>
        <div class="card" style="position:relative;padding:0">
          <canvas id="kg-canvas"></canvas>
          <div id="node-popup" class="node-popup" style="display:none"></div>
          <div id="kg-graph-loading" class="loading-overlay" style="display:none"><div class="spinner"></div></div>
        </div>
        <div style="font-size:13px;color:var(--text2);margin-top:8px" id="kg-graph-info"></div>
      </div>
      <!-- Nodes Tab -->
      <div id="kg-tab-nodes" style="display:none">
        <div class="section-header" style="margin-bottom:12px">
          <span id="kg-nodes-total-info" class="page-info"></span>
          <div class="spacer"></div>
          <select id="kg-nodes-page-size" class="page-size-select">
            <option value="20" selected>20条/页</option>
            <option value="50">50条/页</option>
            <option value="100">100条/页</option>
          </select>
        </div>
        <div class="filter-bar">
          <input type="text" id="kg-node-query" placeholder="搜索节点...">
          <input type="text" id="kg-node-user" placeholder="用户ID">
          <select id="kg-node-type">
            <option value="">全部类型</option>
            <option value="person">人物</option>
            <option value="location">地点</option>
            <option value="organization">组织</option>
            <option value="object">物品</option>
            <option value="event">事件</option>
            <option value="concept">概念</option>
          </select>
          <button class="btn btn-primary" onclick="searchKgNodes()">搜索</button>
        </div>
        <div class="card" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>名称</th><th>类型</th><th>用户</th><th>提及次数</th><th>置信度</th><th>创建时间</th><th>操作</th></tr></thead>
              <tbody id="kg-nodes-tbody"></tbody>
            </table>
          </div>
        </div>
        <div id="kg-nodes-pagination" class="pagination"></div>
      </div>
      <!-- Edges Tab -->
      <div id="kg-tab-edges" style="display:none">
        <div class="section-header" style="margin-bottom:12px">
          <span id="kg-edges-total-info" class="page-info"></span>
          <div class="spacer"></div>
          <select id="kg-edges-page-size" class="page-size-select">
            <option value="20" selected>20条/页</option>
            <option value="50">50条/页</option>
            <option value="100">100条/页</option>
          </select>
        </div>
        <div class="filter-bar">
          <input type="text" id="kg-edge-user" placeholder="用户ID">
          <input type="text" id="kg-edge-node" placeholder="节点ID">
          <select id="kg-edge-relation">
            <option value="">全部关系</option>
            <option value="friend_of">朋友</option>
            <option value="colleague_of">同事</option>
            <option value="family_of">家人</option>
            <option value="knows">认识</option>
            <option value="likes">喜欢</option>
            <option value="works_at">工作于</option>
            <option value="lives_in">居住于</option>
          </select>
          <button class="btn btn-primary" onclick="searchKgEdges()">搜索</button>
        </div>
        <div class="card" style="padding:0">
          <div class="table-wrap">
            <table>
              <thead><tr><th>源节点</th><th>关系</th><th>目标节点</th><th>置信度</th><th>权重</th><th>用户</th><th>时间</th><th>操作</th></tr></thead>
              <tbody id="kg-edges-tbody"></tbody>
            </table>
          </div>
        </div>
        <div id="kg-edges-pagination" class="pagination"></div>
      </div>
    </section>

    <!-- Personas -->
    <section id="sec-personas" class="section">
      <div class="section-header">
        <h2>用户画像</h2>
        <div class="spacer"></div>
        <span id="persona-total-info" class="page-info"></span>
        <select id="persona-page-size" class="page-size-select">
          <option value="12" selected>12条/页</option>
          <option value="24">24条/页</option>
          <option value="48">48条/页</option>
        </select>
      </div>
      <div class="filter-bar">
        <input type="text" id="persona-query" placeholder="搜索用户ID..." style="max-width:300px">
        <button class="btn btn-primary" onclick="searchPersonas()">搜索</button>
        <button class="btn btn-outline" onclick="resetPersonaFilters()">重置</button>
      </div>
      <div id="personas-container" class="persona-grid"></div>
      <div id="persona-pagination" class="pagination"></div>
    </section>

    <!-- Proactive -->
    <section id="sec-proactive" class="section">
      <div class="section-header">
        <h2>主动回复</h2>
        <div class="spacer"></div>
        <button class="btn btn-outline btn-sm" onclick="refreshProactiveTab()">刷新</button>
      </div>
      <div id="proactive-status-container"></div>
      <div class="card">
        <div class="card-title">📋 白名单管理</div>
        <div class="filter-bar">
          <input type="text" id="proactive-group-input" placeholder="群组ID">
          <button class="btn btn-primary" onclick="addProactiveWhitelist()">添加</button>
        </div>
        <div id="proactive-whitelist-container"></div>
      </div>
      <div class="card">
        <div class="card-title">🔍 检查白名单</div>
        <div class="filter-bar">
          <input type="text" id="proactive-check-input" placeholder="输入群组ID检查">
          <span id="proactive-check-result"></span>
        </div>
      </div>
    </section>

    <!-- IO -->
    <section id="sec-io" class="section">
      <div class="section-header">
        <h2>导入导出</h2>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="switchIoTab('export')">导出</div>
        <div class="tab" onclick="switchIoTab('import')">导入</div>
      </div>
      <!-- Export Tab -->
      <div id="io-tab-export">
        <div class="card">
          <div class="card-title">📤 导出记忆</div>
          <div class="filter-bar">
            <input type="text" id="exp-mem-user" placeholder="用户ID (可选)">
            <input type="text" id="exp-mem-group" placeholder="群组ID (可选)">
            <select id="exp-mem-layer">
              <option value="">全部层级</option>
              <option value="working">工作记忆</option>
              <option value="episodic">情景记忆</option>
              <option value="semantic">语义记忆</option>
            </select>
            <select id="exp-mem-format">
              <option value="json">JSON</option>
              <option value="csv">CSV</option>
            </select>
            <button class="btn btn-primary" onclick="exportMemories()">导出</button>
          </div>
        </div>
        <div class="card">
          <div class="card-title">📤 导出知识图谱</div>
          <div class="filter-bar">
            <input type="text" id="exp-kg-user" placeholder="用户ID (可选)">
            <input type="text" id="exp-kg-group" placeholder="群组ID (可选)">
            <select id="exp-kg-format">
              <option value="json">JSON</option>
              <option value="csv">CSV</option>
            </select>
            <button class="btn btn-primary" onclick="exportKg()">导出</button>
          </div>
        </div>
      </div>
      <!-- Import Tab -->
      <div id="io-tab-import" style="display:none">
        <div class="card">
          <div class="card-title">📥 导入记忆</div>
          <div class="import-area" id="import-memories-area"
               ondragover="this.classList.add('dragover');event.preventDefault()"
               ondragleave="this.classList.remove('dragover')"
               ondrop="handleFileDrop(event,'memories')">
            拖拽文件到此处，或 <label style="color:var(--accent);cursor:pointer">选择文件<input type="file" accept=".json,.csv" onchange="handleFileSelect(this,'memories')" hidden></label>
          </div>
          <div id="import-memories-preview" style="margin-top:12px"></div>
          <div id="import-memories-result"></div>
        </div>
        <div class="card">
          <div class="card-title">📥 导入知识图谱</div>
          <div class="import-area" id="import-kg-area"
               ondragover="this.classList.add('dragover');event.preventDefault()"
               ondragleave="this.classList.remove('dragover')"
               ondrop="handleFileDrop(event,'kg')">
            拖拽文件到此处，或 <label style="color:var(--accent);cursor:pointer">选择文件<input type="file" accept=".json,.csv" onchange="handleFileSelect(this,'kg')" hidden></label>
          </div>
          <div id="import-kg-preview" style="margin-top:12px"></div>
          <div id="import-kg-result"></div>
        </div>
      </div>
    </section>

    <!-- Cooldown -->
    <section id="sec-cooldown" class="section">
      <div class="section-header">
        <h2>冷却管理</h2>
      </div>
      <div id="cooldown-container"></div>
    </section>

    <!-- Config -->
    <section id="sec-config" class="section">
      <div class="section-header">
        <h2>配置管理</h2>
        <div class="spacer"></div>
        <button class="btn btn-outline btn-sm" onclick="showConfigDiff()">查看差异</button>
        <button class="btn btn-outline btn-sm" onclick="exportConfigSnapshot()">导出快照</button>
      </div>
      <div class="filter-bar">
        <input type="text" id="config-filter" placeholder="搜索配置项..." oninput="filterConfig()">
      </div>
      <div id="config-container"></div>
    </section>
  </main>
</div>

<!-- Login Modal -->
<div id="login-modal" class="modal-overlay">
  <div class="modal">
    <h3>身份验证</h3>
    <div class="form-group">
      <label>访问密钥</label>
      <input type="password" id="access-key-input" placeholder="请输入访问密钥" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="doLogin()">登录</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div id="confirm-modal" class="modal-overlay">
  <div class="modal">
    <h3 id="confirm-title">确认</h3>
    <p id="confirm-message" style="margin:16px 0;color:var(--text2)"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('confirm-modal')">取消</button>
      <button id="confirm-btn" class="btn btn-danger">确认</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-body" id="detail-modal-body"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-body"></div>
  </div>
</div>

<!-- Persona Detail Modal -->
<div id="persona-detail-modal" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-body"></div>
  </div>
</div>

<!-- Config Diff Modal -->
<div id="config-diff-modal" class="modal-overlay">
  <div class="modal modal-lg">
    <div class="modal-body"></div>
  </div>
</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<script type="module" src="/static/js/main.js"></script>
</body>
</html>
